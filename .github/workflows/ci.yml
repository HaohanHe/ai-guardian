name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: read

jobs:
  # Rust 核心构建和测试
  rust-build:
    name: Rust Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        override: true

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libelf-dev libbpf-dev linux-headers-generic

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check
      continue-on-error: true

    - name: Run clippy
      run: cargo clippy
      continue-on-error: true

    - name: Build Rust core
      run: cargo build --release --verbose

    - name: Run Rust tests
      run: cargo test --verbose
      continue-on-error: true

    - name: Upload Rust artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rust-binary-${{ matrix.os }}
        path: |
          target/release/ai-guardian
          target/release/ai-guardian.exe
        if-no-files-found: warn

    - name: Check Windows binary exists
      if: matrix.os == 'windows-latest'
      run: |
        if (Test-Path target/release/ai-guardian.exe) {
          Write-Host "✅ Windows binary found"
          Get-Item target/release/ai-guardian.exe
        } else {
          Write-Host "❌ Windows binary NOT found"
          exit 1
        }

  # Windows 驱动构建
  windows-driver:
    name: Windows Driver Build
    runs-on: windows-latest
    needs: rust-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows Driver Kit
      run: |
        choco install windowsdriverkit10 --version 10.0.22621.2428
      continue-on-error: true

    - name: Build Windows Driver
      run: |
        cd driver\windows
        .\build.bat
      continue-on-error: true

    - name: Upload Driver artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-driver
        path: |
          driver\windows\build\
        if-no-files-found: ignore

  # Linux eBPF 构建
  linux-ebpf:
    name: Linux eBPF Build
    runs-on: ubuntu-latest
    needs: rust-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm clang libbpf-dev linux-headers-generic
      continue-on-error: true

    - name: Build eBPF programs
      run: |
        cd driver/linux
        make
      continue-on-error: true

    - name: Upload eBPF artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-ebpf
        path: |
          driver/linux/*.o
          driver/linux/*.skel.h
        if-no-files-found: ignore

  # Electron UI 构建
  electron-build:
    name: Electron UI Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Check if UI exists
      id: check-ui
      run: |
        if [ -d "ui" ] && [ -f "ui/package.json" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Install UI dependencies (Unix)
      if: steps.check-ui.outputs.exists == 'true' && runner.os != 'Windows'
      run: |
        cd ui
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Install UI dependencies (Windows)
      if: steps.check-ui.outputs.exists == 'true' && runner.os == 'Windows'
      run: |
        cd ui
        if (Test-Path package-lock.json) {
          npm ci
        } else {
          npm install
        }

    - name: Build Electron UI
      if: steps.check-ui.outputs.exists == 'true'
      run: |
        cd ui
        npm run build

    - name: Run UI tests
      if: steps.check-ui.outputs.exists == 'true'
      run: |
        cd ui
        npm test
      continue-on-error: true

    - name: Upload UI artifacts
      if: steps.check-ui.outputs.exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: electron-ui-${{ matrix.os }}
        path: |
          ui/dist/
          ui/release/
        if-no-files-found: ignore

  # 安全检查
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit
      continue-on-error: true

    - name: Run cargo deny
      run: |
        cargo install cargo-deny
        cargo deny check
      continue-on-error: true

  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Check Rust formatting
      run: cargo fmt -- --check

    - name: Run Rust clippy
      run: cargo clippy -- -D warnings
      continue-on-error: true

    - name: Check if UI exists
      id: check-ui
      run: |
        if [ -d "ui" ] && [ -f "ui/package.json" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Setup Node.js
      if: steps.check-ui.outputs.exists == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check UI code style (Unix)
      if: steps.check-ui.outputs.exists == 'true' && runner.os != 'Windows'
      run: |
        cd ui
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        npm run lint
      continue-on-error: true

    - name: Check UI code style (Windows)
      if: steps.check-ui.outputs.exists == 'true' && runner.os == 'Windows'
      run: |
        cd ui
        if (Test-Path package-lock.json) {
          npm ci
        } else {
          npm install
        }
        npm run lint
      continue-on-error: true

  # 发布 Release
  release:
    name: Create Release
    needs: [rust-build, windows-driver, linux-ebpf, electron-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release Package
      run: |
        mkdir -p release
        cp -r artifacts/* release/ || true
        tar -czf ai-guardian-release.tar.gz release/

    - name: Create GitHub Release
      run: |
        gh release create v${{ github.run_number }} \
          --title "AI Guardian V2 Release ${{ github.run_number }}" \
          --notes "## AI Guardian V2 Release

        ### 包含内容
        - Rust 核心引擎 (Windows/Linux/macOS)
        - Windows 内核驱动
        - Linux eBPF 程序
        - Electron UI

        ### 安装说明
        1. 下载对应平台的二进制文件
        2. Windows: 运行 install-driver.ps1 安装驱动
        3. Linux: 以 root 身份运行
        4. 查看 README.md 获取详细说明

        ### 注意事项
        - Windows 需要启用测试模式或签名驱动
        - Linux 需要 root 权限" \
          --prerelease \
          ai-guardian-release.tar.gz
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
